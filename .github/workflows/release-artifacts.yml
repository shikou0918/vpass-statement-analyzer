name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          go mod download
          mkdir -p ../dist
          CGO_ENABLED=1 go build -o ../dist/vpass-api ./cmd/server

      - name: Build backend image
        run: docker build -t vpass-statement-analyzer-backend:${{ github.sha }} ./backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: vpass-statement-analyzer-backend:${{ github.sha }}
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          timeout: 10m

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          mkdir -p ../dist/frontend
          cp -R dist/. ../dist/frontend/

      - name: Build frontend image
        run: docker build -t vpass-statement-analyzer-frontend:${{ github.sha }} ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: vpass-statement-analyzer-frontend:${{ github.sha }}
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          timeout: 10m

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpass-statement-analyzer
          path: dist/
          if-no-files-found: error
