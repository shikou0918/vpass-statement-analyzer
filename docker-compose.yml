services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      DATABASE_PATH: "/data/vpass.db"
      ALLOWED_ORIGIN: "http://localhost:5173"
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:

