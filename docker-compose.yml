services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      DATABASE_PATH: "/data/vpass.db"
      ALLOWED_ORIGIN: "http://localhost:5173"
      GOCACHE: "/tmp/go-build"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend-data:
  frontend-node-modules:
